# ============================================================================
# Legado Eterno — Virtual host para Dokploy
# TLS lo termina Traefik; aquí solo HTTP en :80. Conserva el ruteo /api->backend
# (con stripping del prefijo) y la caché de borde de /m/.
# Las zonas (api_limit, auth_limit, conn_limit, public_cache) viven en nginx.conf.
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # --- Resolución dinámica de servicios -----------------------------------
    # NO usamos bloques `upstream`: nginx resolvería el nombre una sola vez al
    # arrancar y cachearía la IP del contenedor. En Dokploy/Docker la IP del
    # backend cambia en cada redeploy, dejando a nginx golpeando una IP muerta
    # (errno 113 "Host is unreachable" -> 502). Con el resolver del DNS embebido
    # de Docker (127.0.0.11) y los nombres en variables, nginx re-resuelve el
    # DNS en cada request y siempre apunta al contenedor vivo.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream backend:8000;
    set $frontend_upstream frontend:80;

    # --- Security headers ---------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; font-src 'self' data:; frame-ancestors 'self'" always;

    limit_conn conn_limit 50;

    # --- Endpoints de autenticación: rate limit más estricto ----------------
    # rewrite quita el prefijo /api (el backend sirve en la raíz: /auth/login,
    # NO /api/auth/login) y preserva el query string.
    location ~ ^/api/auth/(login|register|password-reset) {
        limit_req zone=auth_limit burst=10 nodelay;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API (strip del prefijo /api mediante rewrite) ----------------------
    # Con proxy_pass por variable no aplica el strip automático del trailing
    # slash, así que quitamos el prefijo explícitamente con rewrite.
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Memoriales públicos: cacheables en el borde ------------------------
    location /m/ {
        proxy_cache public_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_key "$scheme$host$request_uri";
        add_header X-Cache-Status $upstream_cache_status;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
    }

    # --- SPA frontend -------------------------------------------------------
    location / {
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
