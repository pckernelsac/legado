# ============================================================================
# PostgreSQL 16 — Tuning base para ~1000 conexiones concurrentes (vía pooler)
# Ajustar según RAM del VPS Contabo. Valores pensados para 8 GB RAM.
# ============================================================================

# --- Conexiones -------------------------------------------------------------
listen_addresses = '*'
max_connections = 200            # El pool de la app + pgbouncer multiplexa por encima
superuser_reserved_connections = 3

# --- Memoria ----------------------------------------------------------------
shared_buffers = 2GB             # ~25% RAM
effective_cache_size = 6GB       # ~75% RAM
work_mem = 16MB
maintenance_work_mem = 512MB
huge_pages = try

# --- WAL / Durabilidad ------------------------------------------------------
wal_level = replica
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
wal_compression = on
synchronous_commit = on

# --- Planner ----------------------------------------------------------------
random_page_cost = 1.1           # SSD/NVMe
effective_io_concurrency = 200
default_statistics_target = 100

# --- Paralelismo ------------------------------------------------------------
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_workers = 8
max_parallel_maintenance_workers = 2

# --- Logging / Observabilidad -----------------------------------------------
log_min_duration_statement = 500   # log de queries > 500ms
log_checkpoints = on
log_connections = off
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%m [%p] %q%u@%d '
track_io_timing = on

# --- Autovacuum -------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s

# --- Timezone ---------------------------------------------------------------
timezone = 'UTC'
datestyle = 'iso, mdy'
