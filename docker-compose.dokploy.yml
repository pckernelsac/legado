# ============================================================================
# LEGADO ETERNO — Orquestación para Dokploy
# ----------------------------------------------------------------------------
# Diferencias frente a docker-compose.yml (VPS manual):
#   * NO incluye Postgres: se usa la base de datos GESTIONADA por Dokploy.
#   * NO termina TLS: lo hace Traefik (el reverse proxy de Dokploy).
#   * nginx interno actúa como único entrypoint y conserva el ruteo /api -> backend.
#   * Servicios expuestos se unen a la red externa `dokploy-network` para que
#     Traefik (y la BD gestionada) los alcancen.
#
# Despliegue: en Dokploy -> Create -> Compose, apuntar a este archivo.
# Variables: pegar el contenido de .env.dokploy.example en la pestaña Environment.
# Dominios (pestaña Domains de Dokploy):
#   * Servicio `nginx`  puerto 80  -> dominio principal de la app
#   * Servicio `minio`  puerto 9000 -> subdominio para medios (MINIO_PUBLIC_ENDPOINT)
# ============================================================================
name: legadoeterno

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [legado-internal]
    logging: *default-logging

  # --------------------------------------------------------------------------
  # Nombre único (NO "minio") para no colisionar en Traefik con otros proyectos.
  legado-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: ${MINIO_REGION}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    # dokploy-network: para exponer el endpoint S3 (presigned URLs) vía Traefik.
    networks: [legado-internal, dokploy-network]
    logging: *default-logging

  # Crea los buckets necesarios al arrancar.
  minio-init:
    image: minio/mc:latest
    depends_on:
      legado-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://legado-minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MINIO_BUCKET_MEDIA};
      mc mb --ignore-existing local/$${MINIO_BUCKET_QR};
      mc anonymous set download local/$${MINIO_BUCKET_QR};
      mc anonymous set download local/$${MINIO_BUCKET_MEDIA};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_MEDIA: ${MINIO_BUCKET_MEDIA}
      MINIO_BUCKET_QR: ${MINIO_BUCKET_QR}
    networks: [legado-internal]
    logging: *default-logging

  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      legado-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # dokploy-network: necesaria para alcanzar la BD GESTIONADA de Dokploy.
    networks: [legado-internal, dokploy-network]
    logging: *default-logging

  # --------------------------------------------------------------------------
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    command: celery -A app.infrastructure.tasks.celery_app worker --loglevel=INFO --concurrency=4
    depends_on:
      redis:
        condition: service_healthy
    networks: [legado-internal, dokploy-network]
    logging: *default-logging

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    command: celery -A app.infrastructure.tasks.celery_app beat --loglevel=INFO
    depends_on:
      redis:
        condition: service_healthy
    networks: [legado-internal, dokploy-network]
    logging: *default-logging

  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${API_BASE_URL}
        VITE_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    restart: unless-stopped
    networks: [legado-internal]
    logging: *default-logging

  # --------------------------------------------------------------------------
  # Único entrypoint HTTP. Traefik (Dokploy) termina TLS y enruta aquí.
  # Conserva el ruteo /api -> backend (sin prefijo) y la caché de /m/.
  # Nombre único (NO "nginx") para no colisionar en Traefik con el servicio
  # nginx de otros proyectos del mismo servidor Dokploy.
  legado-proxy:
    # La config se hornea en la imagen (ver infra/nginx/Dockerfile), NO se monta
    # por volumen. Así cada Redeploy reconstruye y recrea el proxy con la config
    # actual, sin restart manual ni problemas de inode con bind-mounts.
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
      - frontend
    networks: [legado-internal, dokploy-network]
    logging: *default-logging

volumes:
  redis_data:
  minio_data:
  nginx_cache:

networks:
  # Red compartida de Dokploy (Traefik + servicios gestionados como la BD).
  dokploy-network:
    external: true
  legado-internal:
    driver: bridge
