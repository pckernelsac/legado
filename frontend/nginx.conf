# Nginx interno del contenedor frontend (sirve la SPA compilada).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Assets con hash: cache agresivo e inmutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.svg { expires 7d; }

    # SPA fallback: cualquier ruta sirve index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
